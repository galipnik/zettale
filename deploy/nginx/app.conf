# Internal HTTP server: serves the static PWA and proxies /api to the backend.
# TLS + the public hostname are handled by Nginx Proxy Manager in front of this.
server {
    listen 80;
    server_name _;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml font/woff2;

    # API → FastAPI backend. Trailing slash strips the /api/ prefix,
    # so /api/tasks reaches the backend as /tasks.
    location /api/ {
        proxy_pass http://api:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static PWA shell.
    location / {
        root /srv;
        try_files $uri /index.html;
    }
}
