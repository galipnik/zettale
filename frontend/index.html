<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f5f2ec">
<title>Zettale</title>
<link rel="manifest" href="manifest.webmanifest">
<script>
  // Resolve theme before first paint to avoid flash.
  (function () {
    var pref = localStorage.getItem("todo_theme") || "system";
    var dark = pref === "dark" || (pref === "system" &&
      window.matchMedia("(prefers-color-scheme: dark)").matches);
    document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
  })();
</script>
<style>
  /* Wortmarken-Schrift — lokal gehostet, überall identisch */
  @font-face {
    font-family: "Zettale Script";
    src: url("mrs-saint-delafield-400.woff2") format("woff2");
    font-weight: 400; font-style: normal; font-display: swap;
  }
  /* ── light (default) ─────────────────────────────────────────────────── */
  :root, :root[data-theme="light"] {
    --bg: #f5f2ec;
    --bg-grad: radial-gradient(125% 125% at 50% 0%, #fbf9f4 0%, #f1ede4 100%);
    --surface: #ffffff;
    --surface-2: #f7f4ed;
    --line: rgba(45,38,24,0.07);
    --line-strong: rgba(45,38,24,0.13);
    --text: #29251f;
    --text-soft: #5f584c;
    --text-faint: #8a8273;
    --accent: #2c2823;
    --accent-soft: #423c33;
    --heute: #c75f38;
    --done-color: #2f9d6e;
    --chip-fg: #6a6357; --chip-bg: #ecebe6;
    --radius: 16px;
    --radius-sm: 11px;
    --shadow-sm: 0 1px 2px rgba(60,45,25,0.05), 0 1px 1px rgba(60,45,25,0.03);
    --shadow-md: 0 4px 18px rgba(60,45,25,0.07), 0 1px 3px rgba(60,45,25,0.04);
    --shadow-lg: 0 14px 44px rgba(60,45,25,0.13), 0 4px 12px rgba(60,45,25,0.07);
    --nav-bottom: calc(82px + env(safe-area-inset-bottom));
  }
  /* ── dark ────────────────────────────────────────────────────────────── */
  :root[data-theme="dark"] {
    --bg: #131311;
    --bg-grad: radial-gradient(125% 125% at 50% -10%, #1d1c19 0%, #0e0e0c 100%);
    --surface: #201f1c;
    --surface-2: #1a1916;
    --line: rgba(250,248,242,0.09); --line-strong: rgba(250,248,242,0.16);
    --text: #f0ede5; --text-soft: #b4ad9f; --text-faint: #8a8475;
    --accent: #f0ede5; --accent-soft: #ddd9cd;
    --heute: #ef9b7a;
    --done-color: #4ecb95;
    --chip-fg: #a8a498; --chip-bg: #2a2825;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.5);
    --shadow-md: 0 6px 22px rgba(0,0,0,0.55), 0 1px 3px rgba(0,0,0,0.45);
    --shadow-lg: 0 18px 52px rgba(0,0,0,0.65), 0 4px 14px rgba(0,0,0,0.5);
  }
  /* dark: dezente Lichtkante oben für Tiefe */
  :root[data-theme="dark"] .capture-wrap,
  :root[data-theme="dark"] .thought,
  :root[data-theme="dark"] .cfg-row,
  :root[data-theme="dark"] .cfg-btn,
  :root[data-theme="dark"] .segmented,
  :root[data-theme="dark"] .flt {
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), var(--shadow-sm);
  }
  :root[data-theme="dark"] .tabnav {
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), var(--shadow-lg);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg); background: var(--bg-grad); background-attachment: fixed;
    color: var(--text); line-height: 1.5;
    padding-top: env(safe-area-inset-top);
    padding-bottom: var(--nav-bottom);
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }
  .wrap { max-width: 680px; margin: 0 auto; padding: 34px 18px 8px; }

  /* floating pill nav */
  .tabnav {
    position: fixed;
    bottom: calc(18px + env(safe-area-inset-bottom));
    left: 50%; transform: translateX(-50%);
    z-index: 100;
    background: color-mix(in srgb, var(--surface) 78%, transparent);
    backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px;
    display: flex; gap: 4px;
    box-shadow: var(--shadow-lg);
    white-space: nowrap;
  }
  .tab {
    border: none; background: transparent; cursor: pointer;
    display: flex; align-items: center; gap: 7px;
    padding: 10px 17px; border-radius: 999px;
    color: var(--text-faint); font-size: 14px; font-weight: 550;
    font-family: inherit; letter-spacing: -0.01em;
    transition: color 0.2s, background 0.2s, transform 0.15s;
    -webkit-tap-highlight-color: transparent; position: relative;
  }
  .tab:active { transform: scale(0.94); }
  .tab svg { width: 18px; height: 18px; flex-shrink: 0; }
  .tab.active { background: var(--accent); color: var(--surface); box-shadow: var(--shadow-sm); }
  .badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 17px; height: 17px; padding: 0 5px;
    background: var(--heute); color: #fff; border-radius: 9px;
    font-size: 10px; font-weight: 700; line-height: 1;
  }

  /* header */
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px; padding: 0 2px;
  }
  .brand { display: flex; align-items: center; gap: 9px; }
  .brand svg { width: 23px; height: 23px; flex-shrink: 0; }
  h1 { font-size: 22px; font-weight: 680; letter-spacing: -0.03em; color: var(--text); }
  /* Schreibschrift-Wortmarke */
  .brand h1 {
    font-family: "Zettale Script", "Segoe Script", "Bradley Hand", cursive;
    font-size: 46px; font-weight: 400; letter-spacing: 0.5px;
    line-height: 1; padding: 4px 0;
  }
  .status { font-size: 11px; color: var(--text-faint); font-weight: 500; }
  .status.offline { color: var(--heute); }

  /* erfassen */
  .capture-wrap {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 10px; box-shadow: var(--shadow-sm); overflow: hidden;
  }
  .capture-wrap:focus-within { border-color: var(--line-strong); box-shadow: var(--shadow-md); }
  #capture, #thought-input {
    width: 100%; border: none; background: transparent; color: var(--text);
    font-size: 16px; padding: 13px 16px; outline: none; font-family: inherit;
    line-height: 1.45; min-height: 50px; resize: none; display: block;
  }
  #capture::placeholder, #thought-input::placeholder { color: var(--text-faint); }
  .capture-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 10px 8px; border-top: 1px solid var(--line); background: var(--surface-2);
  }
  .hint-inline { font-size: 11.5px; color: var(--text-faint); }
  .hint-inline code {
    font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px;
    background: var(--bg); padding: 2px 6px; border-radius: 5px; color: var(--text-soft);
  }
  #addbtn {
    border: none; background: var(--accent); color: var(--surface);
    border-radius: 9px; padding: 7px 14px; font-size: 13.5px; font-weight: 580;
    cursor: pointer; font-family: inherit; flex-shrink: 0; letter-spacing: -0.01em;
    -webkit-tap-highlight-color: transparent; transition: transform 0.12s, opacity 0.15s;
  }
  #addbtn:hover { opacity: 0.9; }
  #addbtn:active { transform: scale(0.93); }
  .footer-chips {
    display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none;
    -webkit-overflow-scrolling: touch; flex: 1; min-width: 0;
  }
  .footer-chips::-webkit-scrollbar { display: none; }
  .fc {
    border: none; background: transparent; cursor: pointer; font-family: inherit;
    font-size: 12.5px; font-weight: 550; padding: 5px 10px; border-radius: 8px;
    white-space: nowrap; flex-shrink: 0; transition: background 0.14s; color: var(--text-soft);
    -webkit-tap-highlight-color: transparent;
  }
  .fc:hover, .fc:active { background: var(--line); }
  .fc-due { color: var(--text-faint); display: inline-flex; align-items: center; gap: 4px; }
  .fc-due svg { width: 13px; height: 13px; }
  /* nativer Datepicker: Feld liegt unsichtbar über dem Button, damit das
     native Popup direkt unter dem Button ankert (nicht in der Ecke). */
  .fc-date-wrap { position: relative; display: inline-flex; flex-shrink: 0; }
  .fc-date-wrap input[type="date"] {
    position: absolute; inset: 0; width: 100%; height: 100%;
    opacity: 0; border: 0; padding: 0; margin: 0; pointer-events: none;
  }

  /* aufgaben */
  .filters {
    display: flex; gap: 7px; flex-wrap: wrap;
    margin-bottom: 16px; padding: 2px 0;
  }
  .flt {
    border: 1px solid var(--line); background: var(--surface); color: var(--text-soft);
    border-radius: 999px; padding: 7px 15px; font-size: 13px; cursor: pointer; font-weight: 540;
    font-family: inherit; transition: all 0.16s; flex-shrink: 0; letter-spacing: -0.01em;
    -webkit-tap-highlight-color: transparent; box-shadow: var(--shadow-sm);
  }
  .flt:hover { border-color: var(--line-strong); }
  .flt.active { background: var(--accent); color: var(--surface); border-color: var(--accent); }
  .done-label { font-size: 11px; color: var(--text-faint); margin: 16px 0 8px 4px;
    text-transform: uppercase; letter-spacing: 0.07em; font-weight: 650; }

  .thought {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); margin-bottom: 7px;
    cursor: pointer; transition: border-color 0.18s, box-shadow 0.18s, transform 0.12s;
    -webkit-tap-highlight-color: transparent; overflow: hidden; box-shadow: var(--shadow-sm);
  }
  .thought:hover { box-shadow: var(--shadow-md); }
  .thought:active { transform: scale(0.994); }
  .thought.expanded { border-color: var(--line-strong); box-shadow: var(--shadow-md); }
  .thought-main { display: flex; align-items: flex-start; gap: 12px; padding: 15px; }
  .thought.is-task .thought-main { align-items: center; padding: 12px 15px; }
  .thought.is-task .thought-text { font-size: 15px; }
  .thought-ctx { font-size: 11px; font-weight: 580; padding: 3px 8px; border-radius: 6px; flex-shrink: 0; margin-top: 1px; }
  .thought-text { flex: 1; font-size: 15px; line-height: 1.55; min-width: 0; white-space: pre-wrap; word-break: break-word; letter-spacing: -0.005em; }
  .thought-time { font-size: 11px; color: var(--text-faint); flex-shrink: 0; margin-top: 3px; font-weight: 500; }
  .thought-actions { display: flex; border-top: 1px solid var(--line); background: var(--surface-2); }
  .thought-action {
    flex: 1; border: none; background: transparent; cursor: pointer;
    padding: 12px 8px; font-size: 13px; font-weight: 560; color: var(--text-soft);
    font-family: inherit; display: flex; align-items: center; justify-content: center;
    gap: 6px; transition: background 0.14s, color 0.14s; -webkit-tap-highlight-color: transparent;
  }
  .thought-action:not(:last-child) { border-right: 1px solid var(--line); }
  .thought-action:hover { background: var(--line); }
  .thought-action.to-task { color: var(--done-color); }
  .thought-action.delete-btn { color: var(--heute); }
  .thought-action svg { width: 14px; height: 14px; }
  .thought-archive-section { margin-top: 30px; }
  .archive-toggle {
    border: none; background: transparent; cursor: pointer; font-family: inherit;
    font-size: 11px; font-weight: 650; letter-spacing: 0.07em; text-transform: uppercase;
    color: var(--text-faint); display: flex; align-items: center; gap: 6px;
    padding: 4px 4px; margin-bottom: 10px; -webkit-tap-highlight-color: transparent;
  }
  .archive-toggle svg { width: 12px; height: 12px; transition: transform 0.2s; }
  .archive-toggle.open svg { transform: rotate(90deg); }
  .thought.archived { opacity: 0.55; box-shadow: none; }
  .thought.task-done { opacity: 0.5; box-shadow: none; }
  .thought.pending { opacity: 0.5; }
  .done-text { text-decoration: line-through; color: var(--text-faint); }
  .check-sm {
    width: 21px; height: 21px; flex-shrink: 0; border-radius: 50%;
    border: 1.8px solid var(--line-strong); display: flex; align-items: center; justify-content: center;
    transition: all 0.18s; padding: 0; background: transparent; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .check-sm.checked { background: var(--done-color); border-color: var(--done-color); }
  .check-sm svg { width: 11px; height: 11px; color: #fff; }
  .chip { font-size: 11px; padding: 3px 9px; border-radius: 7px; flex-shrink: 0; font-weight: 650; letter-spacing: -0.01em; }
  .due { font-size: 11px; color: var(--text-faint); flex-shrink: 0; font-weight: 540; }
  .due.heute { color: var(--heute); font-weight: 600; }
  .del {
    border: none; background: transparent; color: var(--text-faint); cursor: pointer;
    padding: 4px 6px; font-size: 19px; line-height: 1; opacity: 0; transition: opacity 0.14s, color 0.14s;
    flex-shrink: 0; -webkit-tap-highlight-color: transparent;
    min-width: 30px; min-height: 30px; display: flex; align-items: center; justify-content: center;
  }
  /* Action buttons take no horizontal space until the row is clicked. */
  .del { display: none; opacity: 1; }
  .thought.show-actions .del { display: flex; }
  .del:hover { color: var(--heute); }
  .edit-btn svg { width: 14px; height: 14px; }
  .edit-btn:hover { color: var(--text) !important; }

  /* inline editing */
  .thought.is-task.editing .thought-main { gap: 10px; }
  .edit-input {
    flex: 1; min-width: 0; width: 100%;
    border: 1px solid var(--line-strong); background: var(--bg); color: var(--text);
    border-radius: 8px; padding: 8px 10px; font-size: 15px; font-family: inherit;
    outline: none; line-height: 1.45;
  }
  .edit-input:focus { border-color: var(--accent); }
  .edit-area { resize: none; }
  .edit-act {
    border: none; background: transparent; cursor: pointer; font-family: inherit;
    font-size: 13px; font-weight: 560; padding: 6px 8px; border-radius: 7px;
    color: var(--text-soft); flex-shrink: 0; -webkit-tap-highlight-color: transparent;
  }
  .edit-act.save { color: var(--done-color); }
  .edit-act:hover { background: var(--line); }
  .edit-date {
    border: 1px solid var(--line-strong); background: var(--bg); color: var(--text);
    border-radius: 8px; padding: 6px 8px; font-size: 13px; font-family: inherit;
    outline: none; flex-shrink: 0; min-width: 0;
  }
  .edit-date:focus { border-color: var(--accent); }

  /* config: category rename + filter groups */
  .cfg-edit {
    border: none; background: transparent; color: var(--text-faint); cursor: pointer;
    padding: 4px; display: flex; align-items: center; transition: color 0.14s;
    -webkit-tap-highlight-color: transparent;
  }
  .cfg-edit svg { width: 15px; height: 15px; }
  .cfg-edit:hover { color: var(--text); }
  .cfg-group {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-sm);
    padding: 11px 12px; margin-bottom: 8px; box-shadow: var(--shadow-sm);
  }
  .cfg-group-head { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
  .cfg-group-name { flex: 1; font-weight: 580; }
  .cfg-group-cats { display: flex; flex-wrap: wrap; gap: 6px; }
  .gcat {
    border: 1px solid var(--line); background: transparent; color: var(--text-faint);
    border-radius: 999px; padding: 4px 10px; font-size: 12px; font-weight: 580;
    cursor: pointer; font-family: inherit; transition: all 0.14s; opacity: 0.7;
    -webkit-tap-highlight-color: transparent;
  }
  .gcat.on { opacity: 1; border-color: transparent; }

  /* config tab */
  .cfg-section { margin-bottom: 30px; }
  .cfg-label {
    font-size: 11px; font-weight: 650; letter-spacing: 0.07em; text-transform: uppercase;
    color: var(--text-faint); margin-bottom: 12px; padding: 0 4px;
  }
  .cfg-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 12px; }
  .cfg-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius-sm); padding: 11px 14px; box-shadow: var(--shadow-sm);
  }
  .cfg-del {
    border: none; background: transparent; color: var(--text-faint); cursor: pointer;
    font-size: 19px; line-height: 1; padding: 2px 6px;
    -webkit-tap-highlight-color: transparent; transition: color 0.14s;
  }
  .cfg-del:hover { color: var(--heute); }
  .cfg-actions { display: flex; align-items: center; gap: 4px; }
  .cfg-star {
    border: none; background: transparent; cursor: pointer; padding: 4px;
    display: flex; align-items: center; color: var(--text-faint);
    -webkit-tap-highlight-color: transparent; transition: color 0.14s;
  }
  .cfg-star svg { width: 16px; height: 16px; fill: none; }
  .cfg-star:hover { color: var(--text-soft); }
  .cfg-star.is-default { color: var(--heute); }
  .cfg-star.is-default svg { fill: var(--heute); }
  .cfg-add { display: flex; gap: 8px; align-items: center; }
  .cfg-input {
    flex: 1; border: 1px solid var(--line-strong); background: var(--surface);
    color: var(--text); border-radius: var(--radius-sm); padding: 11px 14px;
    font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.18s, box-shadow 0.18s;
  }
  .cfg-input:focus { border-color: var(--accent); box-shadow: var(--shadow-sm); }
  .cfg-addbtn {
    border: none; background: var(--accent); color: var(--surface);
    border-radius: var(--radius-sm); padding: 11px 18px; font-size: 14px; font-weight: 580;
    cursor: pointer; font-family: inherit; white-space: nowrap; letter-spacing: -0.01em;
    -webkit-tap-highlight-color: transparent; transition: opacity 0.15s, transform 0.12s;
  }
  .cfg-addbtn:hover { opacity: 0.9; }
  .cfg-addbtn:active { transform: scale(0.95); }
  .cfg-hint { font-size: 12px; color: var(--text-faint); margin-top: 10px; padding: 0 4px; line-height: 1.55; }
  .segmented {
    display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius-sm); padding: 4px; box-shadow: var(--shadow-sm);
  }
  .seg {
    flex: 1; border: none; background: transparent; cursor: pointer; font-family: inherit;
    font-size: 14px; font-weight: 560; color: var(--text-soft); padding: 9px 8px;
    border-radius: 8px; letter-spacing: -0.01em; display: flex; align-items: center;
    justify-content: center; gap: 6px; transition: background 0.16s, color 0.16s;
    -webkit-tap-highlight-color: transparent;
  }
  .seg svg { width: 15px; height: 15px; }
  .seg.active { background: var(--accent); color: var(--surface); box-shadow: var(--shadow-sm); }
  .cfg-btn {
    border: 1px solid var(--line); background: var(--surface); color: var(--text);
    border-radius: var(--radius-sm); padding: 14px 16px; font-size: 14px; font-weight: 560;
    cursor: pointer; font-family: inherit; width: 100%; text-align: left;
    display: flex; align-items: center; gap: 11px; box-shadow: var(--shadow-sm);
    -webkit-tap-highlight-color: transparent; transition: box-shadow 0.16s, border-color 0.16s, transform 0.12s;
  }
  .cfg-btn:hover { box-shadow: var(--shadow-md); border-color: var(--line-strong); }
  .cfg-btn:active { transform: scale(0.98); }
  .cfg-btn svg { width: 17px; height: 17px; color: var(--text-soft); flex-shrink: 0; }
  .cfg-btn-danger { color: var(--heute); }
  .cfg-btn-danger svg { color: var(--heute); }

  /* autocomplete */
  #ac-dd {
    position: fixed; z-index: 200;
    background: color-mix(in srgb, var(--surface) 92%, transparent);
    backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid var(--line-strong);
    border-radius: 12px; padding: 6px;
    display: flex; gap: 4px; flex-wrap: wrap; max-width: 300px;
    box-shadow: var(--shadow-lg);
  }
  .ac-btn {
    border: none; background: transparent; cursor: pointer;
    font-family: inherit; font-size: 13px; font-weight: 580;
    padding: 7px 11px; border-radius: 8px;
    -webkit-tap-highlight-color: transparent; transition: background 0.12s;
  }
  .ac-btn:hover { background: var(--line); }

  /* shared */
  .empty { color: var(--text-faint); font-size: 14px; padding: 48px 4px; text-align: center; line-height: 1.7; }

  /* setup */
  .setup { max-width: 360px; margin: 80px auto; text-align: center; padding: 0 16px; }
  .setup h2 { font-size: 19px; font-weight: 680; margin-bottom: 8px; letter-spacing: -0.02em; }
  .setup p { font-size: 13px; color: var(--text-soft); margin-bottom: 18px; line-height: 1.6; }
  .setup input {
    width: 100%; padding: 13px 15px; border: 1px solid var(--line-strong);
    border-radius: var(--radius-sm); background: var(--surface); color: var(--text);
    font-size: 15px; margin-bottom: 9px; font-family: inherit; outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
  }
  .setup input:focus { border-color: var(--accent); box-shadow: var(--shadow-sm); }
  .setup button {
    width: 100%; border: none; background: var(--accent); color: var(--surface);
    border-radius: var(--radius-sm); padding: 13px; font-size: 15px; font-weight: 580;
    cursor: pointer; font-family: inherit; transition: opacity 0.15s, transform 0.12s;
  }
  .setup button:hover { opacity: 0.9; }
  .setup button:active { transform: scale(0.98); }
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<nav class="tabnav" id="tabnav"></nav>

<script>
const API   = localStorage.getItem("todo_api")   || "";
const TOKEN = localStorage.getItem("todo_token") || "";
const QUEUE_KEY = "todo_queue";

const DEFAULT_CONTEXTS = ["anexia", "pydata", "aau", "pycarinthia", "privat"];
// Categories + default live in the DB (synced across devices). localStorage is
// just an offline cache so the UI renders instantly before /settings loads.
let CONTEXTS   = JSON.parse(localStorage.getItem("todo_contexts") || JSON.stringify(DEFAULT_CONTEXTS));
let DEFAULT_CTX = localStorage.getItem("todo_default_ctx") || "privat";
let GROUPS     = JSON.parse(localStorage.getItem("todo_groups") || "[]");  // [{name, contexts:[...]}]

function cacheSettings() {
  localStorage.setItem("todo_contexts", JSON.stringify(CONTEXTS));
  localStorage.setItem("todo_default_ctx", DEFAULT_CTX);
  localStorage.setItem("todo_groups", JSON.stringify(GROUPS));
}

// Standard-Kategorie: Fallback beim Erfassen ohne @kontext + initialer Filter.
function getDefaultCtx() {
  if (CONTEXTS.includes(DEFAULT_CTX)) return DEFAULT_CTX;
  return CONTEXTS.includes("privat") ? "privat" : (CONTEXTS[0] || "privat");
}

// Push the current categories + default to the server.
async function pushSettings() {
  try {
    const saved = await api("PUT", "/settings",
      { contexts: CONTEXTS, default_context: getDefaultCtx(), groups: GROUPS });
    CONTEXTS = saved.contexts;
    DEFAULT_CTX = saved.default_context;
    GROUPS = saved.groups || [];
    cacheSettings();
    applyContextStyles();
  } catch (e) { /* keep local; will reconcile on next load/change */ }
}

// Load categories + default from the server (server is source of truth).
// One-time upgrade migration: if this is the first sync on this device and the
// server still has the untouched defaults while this device has customizations
// (from the old localStorage-only version), push the local ones up first so
// they aren't lost.
async function refreshSettings() {
  let server;
  try { server = await api("GET", "/settings"); }
  catch (e) { return; /* offline → keep cached */ }

  if (!localStorage.getItem("todo_settings_synced")) {
    localStorage.setItem("todo_settings_synced", "1");
    const serverIsDefault = JSON.stringify(server.contexts) === JSON.stringify(DEFAULT_CONTEXTS);
    const local = JSON.parse(localStorage.getItem("todo_contexts") || "null");
    const localCustom = local && JSON.stringify(local) !== JSON.stringify(DEFAULT_CONTEXTS);
    if (serverIsDefault && localCustom) {
      CONTEXTS = local;
      DEFAULT_CTX = localStorage.getItem("todo_default_ctx") || getDefaultCtx();
      await pushSettings();   // caches + applies styles
      return;
    }
  }

  CONTEXTS = server.contexts;
  DEFAULT_CTX = server.default_context;
  GROUPS = server.groups || [];
  cacheSettings();
  applyContextStyles();
}

function setDefaultCtx(name) {
  if (!CONTEXTS.includes(name)) return;
  DEFAULT_CTX = name;
  cacheSettings();
  pushSettings();
  if (view === "config") renderConfig();
}

// Rename a category everywhere (settings + all tasks/thoughts) via the server.
let editingCtx = null;
function startRenameCtx(c) { editingCtx = c; renderConfig(); }
function cancelRenameCtx() { editingCtx = null; renderConfig(); }
async function renameCtx(old, val) {
  editingCtx = null;
  const nn = (val || "").trim().toLowerCase().replace(/[^a-z0-9]/g, "");
  if (!nn || nn === old) { renderConfig(); return; }
  if (CONTEXTS.includes(nn)) { alert(t("catExists")); renderConfig(); return; }
  try {
    const s = await api("POST", "/settings/rename-context", { old, new: nn });
    CONTEXTS = s.contexts; DEFAULT_CTX = s.default_context; GROUPS = s.groups || [];
    cacheSettings(); applyContextStyles();
    tasks.forEach(x => { if (x.context === old) x.context = nn; });
    thoughts.forEach(x => { if (x.context === old) x.context = nn; });
    if (filter === old) filter = nn;
    if (gFilter === old) gFilter = nn;
  } catch (e) { alert(t("renameFailed")); }
  renderConfig();
}

// ── filter groups ───────────────────────────────────────────────────────────
function addGroup() {
  const inp = document.getElementById("new-group");
  if (!inp) return;
  const name = inp.value.replace(/["'\\<>]/g, "").trim().slice(0, 40);
  if (!name) return;
  if (GROUPS.length >= 12) return;
  GROUPS.push({ name, contexts: [] });
  cacheSettings(); pushSettings();
  inp.value = "";
  renderConfig();
}
function removeGroup(idx) {
  GROUPS.splice(idx, 1);
  cacheSettings(); pushSettings();
  // dropped group might be the active filter
  if (!filterKeys().includes(filter)) filter = "all";
  if (!filterKeys().includes(gFilter)) gFilter = "all";
  renderConfig();
}
function toggleGroupCtx(idx, ctx) {
  const g = GROUPS[idx]; if (!g) return;
  g.contexts = g.contexts.includes(ctx) ? g.contexts.filter(c => c !== ctx) : [...g.contexts, ctx];
  cacheSettings(); pushSettings();
  renderConfig();
}
function renameGroup(idx, value) {
  const g = GROUPS[idx]; if (!g) return;
  const name = (value || "").replace(/["'\\<>]/g, "").trim().slice(0, 40);
  if (!name || name === g.name) { renderConfig(); return; }
  g.name = name;
  cacheSettings(); pushSettings();
  renderConfig();
}

// Valid filter selections: "all" + group names (or category names as fallback).
function filterKeys() {
  return ["all", ...(GROUPS.length ? GROUPS.map(g => g.name) : CONTEXTS)];
}
// Does an item match the current filter selection?
function filterMatch(item, sel) {
  if (sel === "all") return true;
  const g = GROUPS.find(x => x.name === sel);
  if (g) return g.contexts.includes(item.context);
  return item.context === sel;   // fallback when no groups defined
}

function applyContextStyles() {
  let el = document.getElementById("dyn-ctx");
  if (!el) { el = document.createElement("style"); el.id = "dyn-ctx"; document.head.appendChild(el); }
  el.textContent = CONTEXTS.map((name, i) => {
    const p = PALETTE[i % PALETTE.length];
    return `:root{--${name}:${p.lfg};--${name}-bg:${p.lbg}}` +
           `:root[data-theme="dark"]{--${name}:${p.dfg};--${name}-bg:${p.dbg}}`;
  }).join("");
}
applyContextStyles();

// ── theme ──────────────────────────────────────────────────────────────────
const THEME_COLORS = { light: "#f5f2ec", dark: "#131311" };

function getThemePref() { return localStorage.getItem("todo_theme") || "system"; }

function applyTheme() {
  const pref = getThemePref();
  const dark = pref === "dark" || (pref === "system" &&
    window.matchMedia("(prefers-color-scheme: dark)").matches);
  const resolved = dark ? "dark" : "light";
  document.documentElement.setAttribute("data-theme", resolved);
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute("content", THEME_COLORS[resolved]);
}

function setTheme(pref) {
  localStorage.setItem("todo_theme", pref);
  applyTheme();
  if (view === "config") renderConfig();
}

window.matchMedia("(prefers-color-scheme: dark)")
  .addEventListener("change", () => { if (getThemePref() === "system") applyTheme(); });

applyTheme();

// dates
function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}
function addDaysISO(n) {
  const d = new Date();
  d.setDate(d.getDate() + n);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}

// parsing
function parseTask(raw) {
  let context = getDefaultCtx(), due = "";
  const cm = raw.match(/(^|\s)@(\w+)/);
  if (cm) { const c = cm[2].toLowerCase(); if (CONTEXTS.includes(c)) context = c; }
  const dm = raw.match(/!(\d{4}-\d{2}-\d{2})\b/);
  if (dm) due = dm[1];
  else if (/!(heute|today)\b/i.test(raw)) due = todayISO();
  else if (/!(woche|week)\b/i.test(raw)) due = addDaysISO(7);
  const text = raw
    .replace(/(^|\s)@(\w+)/g, (_, pre, word) => CONTEXTS.includes(word.toLowerCase()) ? pre : _)
    .replace(/!(\d{4}-\d{2}-\d{2}|heute|woche|today|week)\b/gi, "").replace(/\s+/g, " ").trim();
  return { text, context, due };
}

function parseThought(raw) {
  let context = getDefaultCtx();
  const cm = raw.match(/(^|\s)@(\w+)/);
  if (cm) { const c = cm[2].toLowerCase(); if (CONTEXTS.includes(c)) context = c; }
  const text = raw
    .replace(/(^|\s)@(\w+)/g, (_, pre, word) => CONTEXTS.includes(word.toLowerCase()) ? pre : _)
    .replace(/\s+/g, " ").trim();
  return { text, context };
}

// api
async function api(method, path, body) {
  const res = await fetch(API + path, {
    method,
    headers: { "Authorization": "Bearer " + TOKEN, "Content-Type": "application/json" },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 401) { alert(t("tokenInvalid")); throw new Error("401"); }
  if (!res.ok && res.status !== 204) throw new Error(res.status);
  if (res.status === 204) return null;
  const ct = res.headers.get("content-type") || "";
  return ct.includes("application/json") ? res.json() : res.text();
}

function loadQueue() { return JSON.parse(localStorage.getItem(QUEUE_KEY) || "[]"); }
function saveQueue(q) { localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); }

async function flushQueue() {
  let q = loadQueue();
  if (!q.length) return;
  const remaining = [];
  for (const item of q) {
    try { await api(item.method, item.path, item.body); }
    catch (e) {
      if (e.message === "401") { saveQueue([]); return; }
      remaining.push(item);
    }
  }
  saveQueue(remaining);
  if (remaining.length === 0) await refresh();
}

// task actions
async function addTask() {
  const inp = document.getElementById("capture");
  const raw = inp.value.trim();
  if (!raw) return;
  const parsed = parseTask(raw);
  if (!parsed.text) return;
  inp.value = "";
  inp.focus();

  const optimistic = { id: "tmp-" + Date.now(), ...parsed, done: false, pending: true };
  tasks.unshift(optimistic);
  render();

  try {
    const real = await api("POST", "/tasks", parsed);
    const i = tasks.findIndex(t => t.id === optimistic.id);
    if (i > -1) tasks[i] = real;
    render();
  } catch (e) {
    if (!online || e.message !== "401") {
      const q = loadQueue(); q.push({ method: "POST", path: "/tasks", body: parsed }); saveQueue(q);
      const i = tasks.findIndex(t => t.id === optimistic.id);
      if (i > -1) tasks[i].pending = true;
    } else {
      tasks = tasks.filter(t => t.id !== optimistic.id);
    }
    render();
  }
}

function insertCtx(ctx, id = "capture") {
  const inp = document.getElementById(id);
  if (!inp) return;
  const cleaned = inp.value.replace(/(^|\s)@\w+/g, (m, pre) =>
    CONTEXTS.includes(m.trim().slice(1).toLowerCase()) ? pre : m
  ).trim();
  inp.value = (cleaned + " @" + ctx).trim();
  inp.focus();
}

// Entfernt jedes vorhandene Fälligkeits-Token (!heute/!today, !woche/!week, !YYYY-MM-DD).
function stripDue(s) {
  return s.replace(/!(\d{4}-\d{2}-\d{2}|heute|woche|today|week)\b/gi, "").replace(/\s+/g, " ").trim();
}

function insertDue(due) {
  const inp = document.getElementById("capture");
  if (!inp) return;
  inp.value = (stripDue(inp.value) + " !" + due).trim();
  inp.focus();
}

function openDatePicker() {
  const d = document.getElementById("date-pick");
  if (!d) return;
  d.value = todayISO();
  if (d.showPicker) d.showPicker(); else d.focus();
}

function insertDate(iso) {
  const inp = document.getElementById("capture");
  if (!inp || !iso) return;
  inp.value = (stripDue(inp.value) + " !" + iso).trim();
  inp.focus();
}

async function toggleDone(id) {
  const t = tasks.find(x => x.id === id);
  if (!t || String(id).startsWith("tmp-")) return;
  t.done = !t.done;
  render();
  try { await api("PATCH", "/tasks/" + id, { done: t.done }); }
  catch {
    const q = loadQueue();
    q.push({ method: "PATCH", path: "/tasks/" + id, body: { done: t.done } });
    saveQueue(q);
  }
}

async function delTask(id, ev) {
  ev.stopPropagation();
  if (String(id).startsWith("tmp-")) return;
  tasks = tasks.filter(t => t.id !== id);
  render();
  try { await api("DELETE", "/tasks/" + id); }
  catch { const q = loadQueue(); q.push({ method: "DELETE", path: "/tasks/" + id }); saveQueue(q); }
}

// thought actions
async function addThought() {
  const inp = document.getElementById("thought-input");
  const raw = inp.value.trim();
  if (!raw) return;
  const parsed = parseThought(raw);
  if (!parsed.text) return;
  inp.value = "";
  inp.focus();

  const optimistic = { id: "tmp-" + Date.now(), ...parsed, archived: false, created_at: new Date().toISOString(), pending: true };
  thoughts.unshift(optimistic);
  render();

  try {
    const real = await api("POST", "/thoughts", parsed);
    const i = thoughts.findIndex(t => t.id === optimistic.id);
    if (i > -1) thoughts[i] = real;
    render();
  } catch {
    const i = thoughts.findIndex(t => t.id === optimistic.id);
    if (i > -1) thoughts[i].pending = false;
    render();
  }
}

async function archiveThought(id, ev) {
  ev.stopPropagation();
  const t = thoughts.find(x => x.id === id);
  if (!t || String(id).startsWith("tmp-")) return;
  t.archived = true;
  expanded = null;
  render();
  try { await api("PATCH", "/thoughts/" + id + "/archive"); }
  catch { t.archived = false; render(); }
}

async function delThought(id, ev) {
  ev.stopPropagation();
  if (String(id).startsWith("tmp-")) return;
  thoughts = thoughts.filter(t => t.id !== id);
  expanded = null;
  render();
  try { await api("DELETE", "/thoughts/" + id); }
  catch { }
}

async function thoughtToTask(id, ev) {
  ev.stopPropagation();
  const t = thoughts.find(x => x.id === id);
  if (!t || String(id).startsWith("tmp-")) return;
  const taskData = { text: t.text, context: t.context, due: "" };
  thoughts = thoughts.filter(x => x.id !== id);
  expanded = null;
  render();
  try {
    await api("POST", "/tasks", taskData);
    await api("DELETE", "/thoughts/" + id);
    await refreshThoughts();
    await refreshTasks();
  } catch { }
}

function toggleExpand(id) { expanded = expanded === id ? null : id; render(); }
function toggleTaskActions(id) { taskActions = taskActions === id ? null : id; render(); }

// ── inline editing (tasks + thoughts) ──────────────────────────────────────
function startEdit(type, id, ev) {
  if (ev) ev.stopPropagation();
  if (String(id).startsWith("tmp-")) return;
  editing = { type, id };
  render();
}
function cancelEdit(ev) { if (ev) ev.stopPropagation(); editing = null; render(); }

function editKey(ev, type, id) {
  if (ev.key === "Escape") { ev.preventDefault(); cancelEdit(); }
  else if (ev.key === "Enter" && !ev.shiftKey) { ev.preventDefault(); saveEdit(type, id); }
}

async function saveEdit(type, id, ev) {
  if (ev) ev.stopPropagation();
  const inp = document.getElementById("edit-input");
  if (!inp) return;
  const text = inp.value.trim();
  if (!text) { cancelEdit(); return; }
  editing = null;
  if (type === "task") {
    const dateEl = document.getElementById("edit-date");
    const due = dateEl ? dateEl.value : undefined;   // "" clears the deadline
    const it = tasks.find(x => x.id === id);
    if (it) { it.text = text; if (due !== undefined) it.due = due; }
    render();
    const body = due !== undefined ? { text, due } : { text };
    try { await api("PATCH", "/tasks/" + id, body); }
    catch { const q = loadQueue(); q.push({ method: "PATCH", path: "/tasks/" + id, body }); saveQueue(q); }
  } else {
    const it = thoughts.find(x => x.id === id);
    if (it) it.text = text;
    render();
    try { await api("PATCH", "/thoughts/" + id, { text }); } catch { }
  }
}
function toggleArchiveSection(ev) { ev.stopPropagation(); showArchive = !showArchive; render(); }

// context config — optimistic local update, then sync to DB.
function addCtx() {
  const inp = document.getElementById("new-ctx");
  if (!inp) return;
  const val = inp.value.trim().toLowerCase().replace(/[^a-z0-9]/g, "");
  if (!val) return;
  if (CONTEXTS.includes(val)) { inp.value = ""; return; }
  if (CONTEXTS.length >= 8) { alert(t("maxCats")); return; }
  CONTEXTS.push(val);
  cacheSettings();
  applyContextStyles();
  pushSettings();
  inp.value = "";
  renderConfig();
}

function removeCtx(name) {
  if (CONTEXTS.length <= 1) return;
  CONTEXTS = CONTEXTS.filter(c => c !== name);
  if (DEFAULT_CTX === name) DEFAULT_CTX = getDefaultCtx();
  cacheSettings();
  applyContextStyles();
  pushSettings();
  if (!CONTEXTS.includes(filter)) filter = "all";
  if (!CONTEXTS.includes(gFilter)) gFilter = "all";
  renderConfig();
}

// autocomplete
let acField = null;

function setupAc(id) {
  const inp = document.getElementById(id);
  if (!inp) return;
  inp.addEventListener("input", function() {
    acField = this;
    const before = this.value.slice(0, this.selectionStart);
    const m = before.match(/(^|\s)@(\w*)$/);
    if (m) {
      const q = m[2].toLowerCase();
      const matches = CONTEXTS.filter(c => !q || c.startsWith(q));
      if (matches.length) { showAc(matches); return; }
    }
    closeAc();
  });
  inp.addEventListener("keydown", e => { if (e.key === "Escape") closeAc(); });
  inp.addEventListener("blur", () => setTimeout(closeAc, 150));
}

// Open the same suggestion dropdown via the footer button (shows all categories).
function openCtxPicker(id) {
  const inp = document.getElementById(id);
  if (!inp) return;
  acField = inp;
  inp.focus();
  showAc(CONTEXTS);
}

function showAc(matches) {
  let dd = document.getElementById("ac-dd");
  if (!dd) { dd = document.createElement("div"); dd.id = "ac-dd"; document.body.appendChild(dd); }
  const rect = acField.getBoundingClientRect();
  dd.style.left = (rect.left + 12) + "px";
  dd.style.top  = (rect.bottom - 6) + "px";
  dd.innerHTML = matches.map(c =>
    `<button class="ac-btn" style="color:var(--${c})"
      onmousedown="event.preventDefault()" onclick="pickAc('${c}')">${c}</button>`
  ).join("");
}

function closeAc() {
  const el = document.getElementById("ac-dd");
  if (el) el.remove();
}

function pickAc(ctx) {
  if (!acField) return;
  const pos = acField.selectionStart ?? acField.value.length;
  const before = acField.value.slice(0, pos), after = acField.value.slice(pos);
  let fixed;
  if (/(^|\s)@\w*$/.test(before)) {
    // completing a partially typed @token
    fixed = before.replace(/(^|\s)@\w*$/, m => m.replace(/@\w*$/, "@" + ctx)) + " ";
  } else {
    // inserting fresh (e.g. from the footer button)
    const sep = before && !before.endsWith(" ") ? " " : "";
    fixed = before + sep + "@" + ctx + " ";
  }
  acField.value = fixed + after;
  acField.selectionStart = acField.selectionEnd = fixed.length;
  acField.focus();
  closeAc();
}

// data refresh
async function refreshTasks() {
  try { tasks = await api("GET", "/tasks"); online = true; }
  catch { online = false; }
}

async function refreshThoughts() {
  try { thoughts = await api("GET", "/thoughts"); }
  catch { }
}

async function refresh() {
  await Promise.all([refreshSettings(), refreshTasks(), refreshThoughts()]);
  // Filters may reference a category removed on another device.
  if (!CONTEXTS.includes(filter) && filter !== "all") filter = "all";
  if (!CONTEXTS.includes(gFilter) && gFilter !== "all") gFilter = "all";
  render();
}

async function exportTxt() {
  try {
    const text = await api("GET", "/export");
    const blob = new Blob([text], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "todo.txt";
    a.click();
    URL.revokeObjectURL(a.href);
  } catch (e) {
    if (e.message !== "401") alert(t("exportFailed"));
  }
}

function esc(s) {
  return s.replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}
function taskId(t) { return typeof t.id === "string" ? `'${t.id}'` : t.id; }

function fmtTime(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return t("justNow");
  if (diff < 3600) return Math.floor(diff / 60) + " " + t("min");
  if (diff < 86400) return Math.floor(diff / 3600) + " " + t("hour");
  if (diff < 7 * 86400) return Math.floor(diff / 86400) + " " + t("day");
  return d.toLocaleDateString(t("locale"), { day: "numeric", month: "short" });
}

// "today", "tomorrow", weekday (this week) or "1 Jul" — red if due/overdue.
function dueLabel(iso) {
  const today = todayISO();
  if (iso < today) return t("overdue");
  if (iso === today) return t("today");
  if (iso === addDaysISO(1)) return t("tomorrow");
  const d = new Date(iso + "T00:00:00");
  if (iso <= addDaysISO(6)) return d.toLocaleDateString(t("locale"), { weekday: "short" });
  return d.toLocaleDateString(t("locale"), { day: "numeric", month: "short" });
}

  const thoughtCount = thoughts.filter(t => !t.archived).length;
  const aBadge = openCount    > 0 ? `<span class="badge">${openCount    > 99 ? "99+" : openCount}</span>`    : "";
  const gBadge = thoughtCount > 0 ? `<span class="badge">${thoughtCount > 99 ? "99+" : thoughtCount}</span>` : "";

    <button class="tab ${view === "aufgaben" ? "active" : ""}" onclick="setView('aufgaben')">${ICON_AUFGABEN} ${t("tasks")}${aBadge}</button>
    <button class="tab ${view === "gedanken" ? "active" : ""}" onclick="setView('gedanken')">${ICON_GEDANKEN} ${t("thoughts")}${gBadge}</button>
    <button class="tab ${view === "config"   ? "active" : ""}" onclick="setView('config')">${ICON_CONFIG}</button>`;

  if      (view === "aufgaben") renderAufgaben();

  else                          renderConfig();

}

function renderAufgaben() {
  const prevInput  = document.getElementById("capture");
  const savedValue = prevInput ? prevInput.value : "";

  // Sortierung: nach Fälligkeit (undatierte zuletzt), dann Erstellungsdatum (ältestes zuerst).
  const cmp = (a, b) => {
    const da = a.due || "9999-99-99", db = b.due || "9999-99-99";
    if (da !== db) return da < db ? -1 : 1;
    return (a.created_at || "") < (b.created_at || "") ? -1 : 1;
  };
  const open = tasks.filter(t => !t.done).sort(cmp);
  const done = tasks.filter(t => t.done).sort(cmp);

  // Filter chips: only user-defined groups (that have categories). No single categories.
  const opts = GROUPS.filter(g => g.contexts.length).map(g => g.name);
  if (filter !== "all" && !opts.includes(filter)) filter = "all";
  const match = t => filterMatch(t, filter);

  const filterBtns = ["all", ...opts].map(f => {
    const label = f === "all" ? t("all") : f;
    return `<button class="flt ${filter === f ? "active" : ""}" onclick="setFilter('${f}')">${esc(label)}</button>`;
  }).join("");

  const openVisible = open.filter(match);
  const doneVisible = done.filter(match);

  let listHtml = openVisible.length
    ? openVisible.map(taskRow).join("")
    : `<div class="empty">${t("noOpenTasks")}</div>`;

  if (doneVisible.length) {
    listHtml += `<div class="done-label">${t("done")} · ${doneVisible.length}</div>`;
    listHtml += doneVisible.map(taskRow).join("");
  }

  document.getElementById("app").innerHTML = `

      <span class="status ${online ? "" : "offline"}">${online ? "" : t("offlineSync")}</span>

          <button class="fc fc-due" onmousedown="event.preventDefault()" onclick="openCtxPicker('capture')">@ ${t("category")}</button>
          <button class="fc fc-due" onclick="insertDue('${t("dueToday")}')">!${t("dueToday")}</button>
          <button class="fc fc-due" onclick="insertDue('${t("dueWeek")}')">!${t("dueWeek")}</button>
          <span class="fc-date-wrap">
            <button class="fc fc-due" onclick="openDatePicker()" aria-label="${t("pickDate")}">${ICON_CAL} ${t("date")}</button>
            <input type="date" id="date-pick" onchange="insertDate(this.value)" tabindex="-1" aria-hidden="true">
          </span>

        </div>
      </div>`;
    }
    return `<div class="cfg-row">
      <span class="chip" style="background:var(--${c}-bg,var(--chip-bg));color:var(--${c},var(--chip-fg))">${c}</span>
      <div class="cfg-actions">
        <button class="cfg-star ${c === def ? "is-default" : ""}" onclick="setDefaultCtx('${c}')"
          aria-label="${c === def ? t("defaultCat") : t("setDefault")}"
          title="${c === def ? t("defaultCat") : t("setDefault")}">${ICON_STAR}</button>
        <button class="cfg-edit" onclick="startRenameCtx('${c}')" aria-label="${t("edit")}">${ICON_EDIT}</button>
        ${CONTEXTS.length > 1 ? `<button class="cfg-del" onclick="removeCtx('${c}')">×</button>` : ""}
      </div>
    </div>`;
  }).join("");

  const groupItems = GROUPS.map((g, i) => `
    <div class="cfg-group">
      <div class="cfg-group-head">
        <input class="cfg-input cfg-group-name" value="${esc(g.name)}" maxlength="40"
          onchange="renameGroup(${i}, this.value)">
        <button class="cfg-del" onclick="removeGroup(${i})">×</button>
      </div>
      <div class="cfg-group-cats">
        ${CONTEXTS.map(c => {
          const on = g.contexts.includes(c);
          return `<button class="gcat ${on ? "on" : ""}" onclick="toggleGroupCtx(${i},'${c}')"
            style="${on ? `background:var(--${c}-bg,var(--chip-bg));color:var(--${c},var(--chip-fg))` : ""}">${c}</button>`;
        }).join("")}
      </div>
    </div>`).join("");

  const pref = getThemePref();
  const seg = (val, icon, label) =>
    `<button class="seg ${pref === val ? "active" : ""}" onclick="setTheme('${val}')">${icon} ${label}</button>`;
  const langSeg = (val, label) =>
    `<button class="seg ${LANG === val ? "active" : ""}" onclick="setLang('${val}')">${label}</button>`;

  document.getElementById("app").innerHTML = `
    <header><div class="brand"><h1>Zettale</h1></div></header>

    <div class="cfg-section">
      <div class="cfg-label">${t("appearance")}</div>
      <div class="segmented">
        ${seg("system", ICON_SYSTEM, t("system"))}
        ${seg("light", ICON_SUN, t("light"))}
        ${seg("dark", ICON_MOON, t("dark"))}
      </div>
    </div>

    <div class="cfg-section">
      <div class="cfg-label">${t("language")}</div>
      <div class="segmented">
        ${langSeg("en", "English")}
        ${langSeg("de", "Deutsch")}
      </div>
    </div>

    <div class="cfg-section">
      <div class="cfg-label">${t("categories")}</div>
      <div class="cfg-list">${ctxItems}</div>
      <div class="cfg-add">
        <input id="new-ctx" class="cfg-input" placeholder="${t("newCategory")}" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" maxlength="30">
        <button class="cfg-addbtn" onclick="addCtx()">${t("add")}</button>
      </div>
      <div class="cfg-hint">${t("catHint")}</div>
    </div>

    <div class="cfg-section">
      <div class="cfg-label">${t("filters")}</div>
      ${groupItems || `<div class="cfg-hint" style="margin-top:0">${t("noFilters")}</div>`}
      <div class="cfg-add" style="margin-top:10px">
        <input id="new-group" class="cfg-input" placeholder="${t("newGroup")}" maxlength="40"
          onkeydown="if(event.key==='Enter')addGroup()">
        <button class="cfg-addbtn" onclick="addGroup()">${t("add")}</button>
      </div>
      <div class="cfg-hint">${t("filterHint")}</div>
    </div>

    <div class="cfg-section">
      <div class="cfg-label">${t("dataSection")}</div>
      <button class="cfg-btn" onclick="exportTxt()">${ICON_EXPORT} ${t("exportTxt")}</button>
    </div>

    <div class="cfg-section">
      <div class="cfg-label">${t("connection")}</div>
      <button class="cfg-btn cfg-btn-danger" onclick="resetSetup()">${ICON_LINK} ${t("changeConnection")}</button>
    </div>`;

  const inp = document.getElementById("new-ctx");
  if (inp) inp.addEventListener("keydown", e => { if (e.key === "Enter") addCtx(); });
  focusEdit();
}

function setView(v) { closeAc(); editing = null; editingCtx = null; taskActions = null; view = v; render(); }
function setFilter(f) { filter = f; render(); }
function setGFilter(f) { gFilter = f; render(); }
function resetSetup() {
  if (confirm(t("resetConfirm"))) {
    localStorage.removeItem("todo_api"); localStorage.removeItem("todo_token"); location.reload();
  }
}

// boot
window.addEventListener("online",  () => { online = true;  flushQueue(); });
window.addEventListener("offline", () => { online = false; render(); });

// Deep-link to a tab via #gedanken / #config (also used for screenshots).
const hashView = location.hash.replace("#", "");
if (["gedanken", "config", "aufgaben"].includes(hashView)) view = hashView;

if (!API || !TOKEN) {
  renderSetup();
} else {
  render();
  refresh().then(flushQueue);
}

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
</script>
</body>
</html>
